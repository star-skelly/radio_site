<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive 3D Wheel</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        #instructions {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
    <body>
        <div id="ui-container">
        <div id="radio-station">Radio BaiBai</div>
        <div id="frequency-display">14.94</div>
        <span id="unit">simibab</span>
    </div>

    <style>
        #ui-container {
            position: absolute;
            top: 50%;
            left: 50px;
            transform: translateY(-50%);
            color: #c44e12;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px #950032;
            pointer-events: none; /* So it doesn't block mouse clicks */
            user-select: none;
        }
        #frequency-display {
            font-size: 80px;
            font-weight: bold;
        }
        #radio-station {
            font-size: 50px;
        }
    </style>
    <div id="instructions">Turn the wheel to get your radio station.</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // three js part
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        renderer.toneMappingExposure = 1.0; // Adjust brightness
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ReinhardToneMapping;  

        // Lighting
        const environment = new RoomEnvironment(renderer);
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        const mainLight = new THREE.DirectionalLight(0xFFBB43, 3.0); 
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0xFFBB43, 1);
        fillLight.position.set(-5, 0, -5);
        scene.add(fillLight);

        const ambient = new THREE.AmbientLight(0x926CA9, 100.0); // Low ambient so shadows exist
        scene.add(ambient);
        
        camera.position.z = 4;
        camera.position.y = 2.5;
        camera.position.x = -4;
        camera.rotation.x = -0.5;
        camera.rotation.y = -0.3;
        camera.rotation.z = -0.3;

        // Load the Model
        let wheel;
        let radio_base;
        const textureLoader = new THREE.TextureLoader();
        const loader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();

        const textureConfigs = [
            { type: 'map', url: 'textures/00_rad_color.png', isSRGB: true, isWheel: false },
            { type: 'roughnessMap', url: 'textures/00_rad_roughness.png', isSRGB: false, isWheel: false },
            { type: 'normalMap', url: 'textures/00_rad_normal.png', isSRGB: false, isWheel: false },  
            
            // For the wheel, we use the same 'type' names so they plug into the right material slots
            { type: 'roughnessMap', url: 'textures/00_wheel_roughness.png', isSRGB: false, isWheel: true },
            { type: 'normalMap', url: 'textures/00_wheel_normal.png', isSRGB: false, isWheel: true },
            { type: 'map', url: 'textures/00_wheel_color.png', isSRGB: true, isWheel: true },
        ];
        const baseTextures = {};
        const wheelTextures = {}
        
        textureConfigs.forEach(config => {
            const tex = textureLoader.load(config.url);
            tex.flipY = false;
            if (config.isSRGB) tex.colorSpace = THREE.SRGBColorSpace;

            if (config.isWheel) {
                wheelTextures[config.type] = tex;
            } else {
                baseTextures[config.type] = tex;
            }
        });

        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);

        loader.load('11_alien_radio_2.gltf', (gltf) => {
            const model = gltf.scene;
            const radio_base = model.getObjectByName('radio_base');
            wheel = model.getObjectByName('outer_ring');

            if (radio_base) {
                Object.assign(radio_base.material, baseTextures);
                
                radio_base.material.metalness = 1.0;
                radio_base.material.normalScale.set(2, 2);
                radio_base.material.needsUpdate = true;
            }            

            if (wheel) {
                Object.assign(wheel.material, wheelTextures);
                wheel.material.metalness = 0.9;
                wheel.material.normalScale.set(1.5, 1.5);
                wheel.material.needsUpdate = true;
            }
            scene.add(model);
        });
        // 4. Interaction Logic
        let isDragging = false;
        let previousMouseX = 0;

        window.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (event) => {
            if (isDragging && wheel) {
                const deltaX = event.clientX - previousMouseX;
                wheel.rotation.y += deltaX * 0.01; 
                updateUI();
            }
            previousMouseX = event.clientX;
        });

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // normal text part
        const displayElement = document.getElementById('frequency-display');

        const minFreq = 12.83;
        const maxFreq = 15.93;

        function updateUI() {
            if (!wheel) return;

            const rotation = Math.abs(wheel.rotation.y % (Math.PI * 2));
            const percent = rotation / (Math.PI * 2);
            const freq = minFreq + (percent * (maxFreq - minFreq));
            
            displayElement.innerText = freq.toFixed(2);
        }
    </script>
</body>
</html>
