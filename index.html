<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Torobos Ham Radio</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
    </style>
</head>
    <body>
        <div id="ui-container">
        <div id="instructions">Use the &#8679 and &#8681 keys or turn the wheel to browse channels.</div>
        <div id="radio-station">No Station Found</div>
        <div id="frequency-display">14.45 sb</div>
        <br>
        <audio id="static-player" src="audio/Static.m4a" loop autoplay></audio>
        <audio id="station-player"></audio>
        <audio id="baibai"></audio>
        <div id="description"></div>
    </div>

    <style>
        #ui-container {
            position: absolute;
            top: 40%;
            left: 50px;
            transform: translateY(-50%);
            color: #c44e12;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px #950032;
            pointer-events: none;
            user-select: none;
        }
        #frequency-display {
            font-size: 80px;
            font-weight: bold;
        }
        #radio-station {
            font-size: 50px;
        }
        #description {
            word-wrap: break-word;
            width: 30%;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // three js part
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        renderer.toneMappingExposure = 1.0; // Adjust brightness
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ReinhardToneMapping;  

        // Lighting
        const environment = new RoomEnvironment(renderer);
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        //const mainLight = new THREE.DirectionalLight(0xFFBBBB, 4.0); 
        //mainLight.position.set(-5, 10, -7);
        //scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x926CA9, 3.3, 0, 0.27);
        fillLight.position.set(2.5, 1.75, -0.5);
        fillLight.power = 100;
        scene.add(fillLight);
        
        const fillLight2 = new THREE.PointLight(0xFFBB43, 1.4, 0, 1.1);
        fillLight2.power = 1000;
        fillLight2.position.set(2.3, 3.05, 1.75);
        scene.add(fillLight2);

        const ambient = new THREE.AmbientLight(0xFFBB43, 100.0); // Low ambient so shadows exist
        scene.add(ambient);
        
        camera.position.z = 4;
        camera.position.y = 2.5;
        camera.position.x = -4;
        camera.rotation.x = -0.5;
        camera.rotation.y = -0.3;
        camera.rotation.z = -0.3;

        // Load the Model
        let wheel;
        let radio_base;
        const textureLoader = new THREE.TextureLoader();
        const loader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();

        const textureConfigs = [
            // radio base
            { type: 'map', url: 'textures/00_rad_color.png', isSRGB: true, obj: 'rad' },
            { type: 'roughnessMap', url: 'textures/00_rad_roughness.png', isSRGB: false, obj: 'rad' },
            { type: 'normalMap', url: 'textures/00_rad_normal.png', isSRGB: false, obj: 'rad' },  
            
            // wheel
            { type: 'roughnessMap', url: 'textures/00_wheel_roughness.png', isSRGB: false, obj: 'wheel' },
            { type: 'normalMap', url: 'textures/00_wheel_normal.png', isSRGB: false, obj: 'wheel' },
            { type: 'map', url: 'textures/00_wheel_color.png', isSRGB: true, obj: 'wheel' },

            // wiring
            { type: 'roughnessMap', url: 'textures/00_wire_roughness.png', isSRGB: false, obj: 'wire' },
            { type: 'normalMap', url: 'textures/00_wire_normal.png', isSRGB: false, obj: 'wire' },
            { type: 'map', url: 'textures/00_wire_color.png', isSRGB: true, obj: 'wire' },
        ];
        const baseTextures = {};
        const wheelTextures = {};
        const wireTextures = {};
        
        textureConfigs.forEach(config => {
            const tex = textureLoader.load(config.url);
            tex.flipY = false;
            if (config.isSRGB) tex.colorSpace = THREE.SRGBColorSpace;

            if (config.obj === 'wheel') {
                wheelTextures[config.type] = tex;
            } else if (config.obj === 'rad') {
                baseTextures[config.type] = tex;
            } else if (config.obj === 'wire') {
                wireTextures[config.type] = tex;
            }
        });

        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);

        loader.load('11_alien_radio_2.gltf', (gltf) => {
            const model = gltf.scene;
            const radio_base = model.getObjectByName('radio_base');
            const wired = model.getObjectByName('wired');
            const bgs = model.getObjectByName('feet_n_backs');
            const grid = model.getObjectByName('grid');

            wheel = model.getObjectByName('outer_ring');
            if (grid) {
                grid.material.color.set(0xE3CBB8);
                grid.material.roughness = 1.0;
                wired.material.metalness = 0.0;
                grid.material.needsUpdate = true;
            }
            if (bgs) {
                bgs.material.color.set(0x361E0F);
                bgs.material.roughness = 1.0;
                bgs.material.metalness = 0.56;
                bgs.material.needsUpdate = true;
            }
            if (radio_base) {
                const oldMat = radio_base.material;
                radio_base.material = new THREE.MeshPhysicalMaterial().copy(oldMat);
                Object.assign(radio_base.material, baseTextures);
                
                radio_base.material.sheen = 0.1;
                radio_base.material.sheenColor = new THREE.Color(0x704A39); 
                radio_base.material.sheenRoughness = 0.5;
                radio_base.material.metalness = 1.0;
                radio_base.material.normalScale.set(-1, -1);
                radio_base.material.needsUpdate = true;
            }            

            if (wheel) {
                Object.assign(wheel.material, wheelTextures);
                wheel.material.metalness = 0.99;
                wheel.material.normalScale.set(3, 3);
                wheel.material.needsUpdate = true;
            }

            if (wired) {
                Object.assign(wired.material, wireTextures);
                wired.material.metalness = 1.0;
                wired.material.needsUpdate = true;
            }
            scene.add(model);
        });
        // 4. Interaction Logic
        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;
        let angleChange = 0;
        
        window.addEventListener("keydown", function (event) {
            if (event.key === "ArrowUp") {
                wheel.rotation.y -= 0.1;
            } else if (event.key === "ArrowDown") {
                wheel.rotation.y += 0.1;
            }
            updateUI();
        });

        window.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (event) => {
            if (isDragging && wheel) {
                const xDiff = event.clientX - previousMouseX;
                const yDiff = event.clientY - previousMouseY;
                if (Math.abs(angleChange) < (Math.PI / 20.0)) {
                    angleChange += (xDiff + yDiff) * 0.003;
                    wheel.rotation.y += (xDiff + yDiff) * 0.0005;
                } else {
                    wheel.rotation.y += angleChange;
                    angleChange = 0;
                }
                updateUI();
            }
            previousMouseX = event.clientX;
            previousMouseY = event.clientY;
        });

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // normal text part
        let radioChannels = [];

        fetch('./channel_descriptions.json')
            .then(res => res.json())
            .then(data => {
                radioChannels = data.channels;
            });
        const freqDisplay = document.getElementById('frequency-display');
        const radioStation = document.getElementById('radio-station');
        const stationDescription = document.getElementById('description');
        const staticPlayer = document.getElementById('static-player');
        const stationPlayer = document.getElementById('station-player');
        const baibaiPlayer = document.getElementById('baibai');
        let currentStationName = null;

        const minFreq = 12.83;
        const maxFreq = 15.93;

        function updateUI() {
            if (!wheel) return;

            const rotation = Math.abs(wheel.rotation.y % (Math.PI * 2));
            const percent = rotation / (Math.PI * 2);
            const freq = minFreq + (percent * (maxFreq - minFreq));
            
            const activeChannel = radioChannels.find(channel => 
                freq >= channel.min && freq <= channel.max
            );

            if (activeChannel) {
                const center = (activeChannel.min + activeChannel.max) / 2.0;
                const dist = Math.abs(freq - center);
                const range = Math.abs(activeChannel.max - activeChannel.min) / 2.0;
                const variance = 0.5; // Controls how "wide" the clear signal is
                const normalizedDist = dist / range;
                const strength = Math.exp(-(Math.pow(normalizedDist, 2)) / (2 * Math.pow(variance, 2)));

                staticPlayer.volume = 1.0 - strength;
                
                if (activeChannel.name === "Radio :Bai:Bai") {
                    const newSrc = activeChannel.audio;
                    baibaiPlayer.volume = strength;
                    if (baibaiPlayer.getAttribute('src') !== newSrc) {
                        baibaiPlayer.src = newSrc;
                        baibaiPlayer.load(); // Vital: tells the browser to buffer the new file
                        baibaiPlayer.play(); // Browsers often block autoplay; this helps
                    }
                } else if (currentStationName !== activeChannel.name) {
                    stationPlayer.volume = strength;
                    currentStationName = activeChannel.name;
                    stationPlayer.src = "audio/frog_drums.mp3";
                    stationPlayer.load();
                    stationPlayer.play();
                } else {
                    baibaiPlayer.volume = 0;
                }

                radioStation.innerText = activeChannel.name;
                stationDescription.innerText = activeChannel.description;

            } else {
                currentStationName = null;
                stationPlayer.volume = 0; 
                staticPlayer.volume = 1.0;                
                radioStation.innerText = "NO SIGNAL";
                stationDescription.innerText = "Keep tuning the dial...";
            }
            freqDisplay.innerText = freq.toFixed(2) + " sb";
        }
    </script>
</body>
</html>
