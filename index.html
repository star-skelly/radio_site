<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Torobos Ham Radio</title>
    <link rel="icon" type="image/x-icon" href="/media/logo.png">
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
    </style>
</head>
    <body>
        <div id="ui-container">
        <div id="instructions">Use the &#8678 and &#8680 keys or turn the wheel to browse channels.</div>
        <div id="instructions">Use the &#8679 and &#8681 keys to turn volume up and down.</div>
        <div id="radio-station">No Station Found</div>
        <div id="frequency-display">14.45 sb</div>
        <br>
        <audio id="static-player" src="audio/static.mp3" loop autoplay></audio>
        <audio id="station-player"></audio>
        <audio id="baibai"></audio>
        <div id="description"></div>
    </div>

    <style>
        #ui-container {
            position: absolute;
            top: 40%;
            left: 50px;
            transform: translateY(-50%);
            color: #c44e12;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px #950032;
            pointer-events: none;
            user-select: none;
        }
        #frequency-display {
            font-size: 80px;
            font-weight: bold;
        }
        #radio-station {
            font-size: 50px;
        }
        #description {
            word-wrap: break-word;
            width: 30%;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // three js part
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        renderer.toneMappingExposure = 1.0; // Adjust brightness
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ReinhardToneMapping;  

        // Lighting
        const environment = new RoomEnvironment(renderer);
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        const mainLight = new THREE.DirectionalLight(0xFFBBBB, 4.0); 
        mainLight.position.set(-5, 10, -7);
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x926CA9, 3.3, 0, -5);
        fillLight.position.set(4.5, 1.5, -1);
        fillLight.power = 1;
        scene.add(fillLight);
        
        const fillLight2 = new THREE.PointLight(0xFFBB43, 1.4, 0, 1.1);
        fillLight2.power = 1000;
        fillLight2.position.set(2.3, 3.05, 1.75);
        scene.add(fillLight2);

        const ambient = new THREE.AmbientLight(0xFFBB43, 100.0); // Low ambient so shadows exist
        scene.add(ambient);
        
        camera.position.z = 4;
        camera.position.y = 2.5;
        camera.position.x = -4;
        camera.rotation.x = -0.5;
        camera.rotation.y = -0.3;
        camera.rotation.z = -0.3;

        // Load the Model
        let wheel;
        let volumeDial;
        let radioBase;
        let dial;
        const textureLoader = new THREE.TextureLoader();
        const loader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();

        const textureConfigs = [
            // radio base
            { type: 'map', url: 'textures/00_rad_color.png', isSRGB: true, obj: 'rad' },
            { type: 'roughnessMap', url: 'textures/00_rad_roughness.png', isSRGB: false, obj: 'rad' },
            { type: 'normalMap', url: 'textures/00_rad_normal.png', isSRGB: false, obj: 'rad' },  
            
            // wheel
            { type: 'roughnessMap', url: 'textures/00_wheel_roughness.png', isSRGB: false, obj: 'wheel' },
            { type: 'normalMap', url: 'textures/00_wheel_normal.png', isSRGB: false, obj: 'wheel' },
            { type: 'map', url: 'textures/00_wheel_color.png', isSRGB: true, obj: 'wheel' },

            // wiring
            { type: 'roughnessMap', url: 'textures/00_wire_roughness.png', isSRGB: false, obj: 'wire' },
            { type: 'normalMap', url: 'textures/00_wire_normal.png', isSRGB: false, obj: 'wire' },
            { type: 'map', url: 'textures/00_wire_color.png', isSRGB: true, obj: 'wire' },
        ];
        const baseTextures = {};
        const wheelTextures = {};
        const wireTextures = {};
        
        textureConfigs.forEach(config => {
            const tex = textureLoader.load(config.url);
            tex.flipY = false;
            if (config.isSRGB) tex.colorSpace = THREE.SRGBColorSpace;

            if (config.obj === 'wheel') {
                wheelTextures[config.type] = tex;
            } else if (config.obj === 'rad') {
                baseTextures[config.type] = tex;
            } else if (config.obj === 'wire') {
                wireTextures[config.type] = tex;
            }
        });

        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);

        loader.load('11_alien_radio_2.gltf', (gltf) => {
            const model = gltf.scene;
            const radioBase = model.getObjectByName('radio_base');
            const wired = model.getObjectByName('wired');
            const bgs = model.getObjectByName('feet_n_backs');
            const grid = model.getObjectByName('grid');
            volumeDial = model.getObjectByName('volume');
            dial = model.getObjectByName('dial_pt')

            wheel = model.getObjectByName('outer_ring');
            wheel.rotation.y = Math.PI;
            if (grid) {
                grid.material.color.set(0xE3CBB8);
                grid.material.roughness = 1.0;
                wired.material.metalness = 0.0;
                grid.material.needsUpdate = true;
            }
            if (bgs) {
                bgs.material.color.set(0x361E0F);
                bgs.material.roughness = 1.0;
                bgs.material.metalness = 0.56;
                bgs.material.needsUpdate = true;
            }
            if (radioBase) {
                const oldMat = radioBase.material;
                radioBase.material = new THREE.MeshPhysicalMaterial().copy(oldMat);
                Object.assign(radioBase.material, baseTextures);
                
                radioBase.material.sheen = 0.1;
                radioBase.material.sheenColor = new THREE.Color(0x704A39); 
                radioBase.material.sheenRoughness = 0.5;
                radioBase.material.metalness = 1.0;
                radioBase.material.normalScale.set(-1, -1);
                radioBase.material.needsUpdate = true;
            }            

            if (wheel) {
                Object.assign(wheel.material, wheelTextures);
                wheel.material.metalness = 0.99;
                wheel.material.normalScale.set(3, 3);
                wheel.material.needsUpdate = true;
            }

            if (wired) {
                Object.assign(wired.material, wireTextures);
                wired.material.metalness = 1.0;
                wired.material.needsUpdate = true;
            }
            scene.add(model);
        });
        
        // Interaction Logic
        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;
        let angleChange = 0;
        const volMinRot = 0;
        const volMaxRot = Math.PI * 1.5; // A 270-degree turn
        const wheelMinRot = 0;
        const wheelMaxRot = Math.PI * 2; // A 270-degree turn

        window.addEventListener("keydown", function (event) {
            if (event.key === "ArrowRight") {
                wheel.rotation.y = Math.min(wheelMaxRot, wheel.rotation.y + 0.1);
            } else if (event.key === "ArrowLeft") {
                wheel.rotation.y = Math.max(wheelMinRot, wheel.rotation.y - 0.1);
            } else if (event.key === "ArrowUp") {
                volumeDial.rotation.x = Math.min(volMaxRot, volumeDial.rotation.x + 0.1);
            } else if (event.key === "ArrowDown") {
                volumeDial.rotation.x = Math.max(volMinRot, volumeDial.rotation.x - 0.1);
            }
            updateUI();
            updateMasterVolume();
        });

        window.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (event) => {
            if (isDragging && wheel) {
                // use trig to make this better?
                const xDiff = event.clientX - previousMouseX;
                const yDiff = event.clientY - previousMouseY;
                const diff = xDiff + yDiff;
                wheel.rotation.y = Math.max(Math.min(wheelMaxRot, wheel.rotation.y + 0.003 * diff), wheelMinRot);
                updateUI();
            }
            previousMouseX = event.clientX;
            previousMouseY = event.clientY;
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // normal text part + radio channel part
        let radioChannels = [];
        const stationPool = {};

        fetch('./channel_descriptions.json').then(res => res.json()).then(data => {
            radioChannels = data.channels;
            
            radioChannels.forEach(channel => {
                const audio = new Audio(channel.audio);
                audio.loop = true;
                audio.volume = 0; // start silent
                
                // random timestamp start
                audio.addEventListener('loadedmetadata', () => {
                    audio.currentTime = Math.random() * audio.duration;
                });

                stationPool[channel.name] = audio;
            });
        });
        const freqDisplay = document.getElementById('frequency-display');
        const radioStation = document.getElementById('radio-station');
        const stationDescription = document.getElementById('description');
        const staticPlayer = document.getElementById('static-player');
        const stationPlayer = document.getElementById('station-player');
        const baibaiPlayer = document.getElementById('baibai');
        let currentStationName = null;

        const minFreq = 12.83;
        const maxFreq = 15.93;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // volume control = gain 
        // 1. Setup Master Gain
        const masterGain = audioCtx.createGain();
        
        masterGain.gain.value = 0.8;
        masterGain.connect(audioCtx.destination); // This is the ONLY node connected to destination

        // muffle effect
        const filter = audioCtx.createBiquadFilter();
        filter.type = "lowpass"; 
        filter.connect(masterGain); 
        
        const staticSource = audioCtx.createMediaElementSource(staticPlayer);
        staticSource.connect(masterGain);
        
        function updateMasterVolume() {
            const masterVolume = volumeDial.rotation.x / volMaxRot;
            masterGain.gain.setTargetAtTime(masterVolume, audioCtx.currentTime, 0.05);
        }

        const sourceNodes = {};

        function setupAudioGraph(player, stationName) {
            if (!sourceNodes[stationName]) {
                // Pipe the HTML audio element into the Web Audio API
                const source = audioCtx.createMediaElementSource(player);
                source.connect(filter);
                sourceNodes[stationName] = source;
            }
        }

        function updateUI() {
            const rotation = wheel.rotation.y % (Math.PI * 2);
            const percent = rotation / (Math.PI * 2);
            let freq = minFreq + (percent * (maxFreq - minFreq));

            if (freq < minFreq) {
                freq = maxFreq + (percent * (maxFreq - minFreq))
            }

            // update the lil dial
            dial.rotation.y = Math.PI * 0.4 * ((freq - minFreq) / (maxFreq - minFreq));
            const activeChannel = radioChannels.find(ch => freq >= ch.min && freq <= ch.max);

            radioChannels.forEach(ch => {
                const player = stationPool[ch.name];
                if (!player) return;
                setupAudioGraph(player, ch.name);
                player.volume = 0;

                if (audioCtx.state === 'suspended') audioCtx.resume();

                if (player.paused) {
                    player.play().catch(err => console.log("Autoplay blocked:", err));
                }
            });

            if (activeChannel) {
                const currentPlayer = stationPool[activeChannel.name];
                const center = (activeChannel.min + activeChannel.max) / 2.0;
                const dist = Math.abs(freq - center);
                const range = Math.abs(activeChannel.max - activeChannel.min) / 2.0;
                const strength = Math.exp(-(Math.pow(dist / range, 2)) / (Math.pow(0.5, 2)));
                
                const cutoff = 400 + (Math.pow(strength, 2) * 19600); 
                filter.frequency.setTargetAtTime(cutoff, audioCtx.currentTime, 0.05);
                
                currentPlayer.volume = Math.min(1.0, strength);
                staticPlayer.volume = Math.max(0.05, 0.8 - currentPlayer.volume);
                radioStation.innerText = activeChannel.name;
                stationDescription.innerText = activeChannel.description;
            } else {
                filter.frequency.setTargetAtTime(400, audioCtx.currentTime, 0.05);
                staticPlayer.volume = 1.0;
                radioStation.innerText = "NO SIGNAL";
                stationDescription.innerText = "Keep tuning the dial...";
            }
            freqDisplay.innerText = freq.toFixed(2) + " sb";
        }
    </script>
</body>
</html>
