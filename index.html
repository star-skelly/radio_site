<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive 3D Wheel</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        #instructions {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instructions">Click and Drag to Spin the Wheel</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        // Add a quick "Studio" environment so reflections have something to show

        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        renderer.toneMappingExposure = 1.0; // Adjust brightness
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ReinhardToneMapping;  

        // 2. High-Contrast Lighting
        // This creates "rim lighting" so you can see the edges of the wheel
        const environment = new RoomEnvironment(renderer);
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        const mainLight = new THREE.DirectionalLight(0xffffff, 10.0); 
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0xffffff, 10.0);
        fillLight.position.set(-5, 0, -5);
        scene.add(fillLight);

        const ambient = new THREE.AmbientLight(0xffffff, 10.0); // Low ambient so shadows exist
        scene.add(ambient);
        
        camera.position.z = 4;
        camera.position.y = 2;
        camera.position.x = -2;
        camera.rotation.x = -0.4;
        camera.rotation.y = -0.2;
        camera.rotation.z = -0.1;

        // 3. Load the Model
        let wheel;
        let radio_base;
        const textureLoader = new THREE.TextureLoader();
        const loader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();
        const baseTexture = textureLoader.load('textures/radio_base.png');
        const baseRough = textureLoader.load('textures/00_rad_roughness.png');
        const baseNorm = textureLoader.load('textures/00_rad_roughness.png');
        baseTexture.flipY = false; 
        baseTexture.colorSpace = THREE.SRGBColorSpace;
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);

        loader.load('11_alien_radio_2.gltf', (gltf) => {
            const model = gltf.scene;
            radio_base = model.getObjectByName('radio_base');
            radio_base.material.map = baseTexture;                
            radio_base.material.roughness = baseRough; 
            radio_base.material.normal = baseNorm;
            radio_base.material.metalness = 1.0;
            
            radio_base.material.needsUpdate = true;
            
            wheel = model.getObjectByName('outer');

            scene.add(model);
        });
        // 4. Interaction Logic
        let isDragging = false;
        let previousMouseX = 0;

        window.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (event) => {
            if (isDragging && wheel) {
                const deltaX = event.clientX - previousMouseX;
                // Rotate the wheel based on mouse movement
                wheel.rotation.y += deltaX * 0.01; 
            }
            previousMouseX = event.clientX;
        });

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
