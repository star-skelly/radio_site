<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive 3D Wheel</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        #instructions {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instructions">Click and Drag to Spin the Wheel</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lighting
        const light = new THREE.DirectionalLight(0xffffff, 2); // Increased intensity to 2
        light.position.set(5, 5, 5); 
        scene.add(light); // Correct way to add to scene

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); // Soft white light everywhere
        scene.add(ambientLight);

        camera.position.z = 5;

        // 3. Load the Model
        let wheel;
        const loader = new GLTFLoader();
        
        loader.load('11_alien_radio_2.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);

            wheel = model.getObjectByName('outer'); 
        });

        // 4. Interaction Logic
        let isDragging = false;
        let previousMouseX = 0;

        window.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (event) => {
            if (isDragging && wheel) {
                const deltaX = event.clientX - previousMouseX;
                // Rotate the wheel based on mouse movement
                wheel.rotation.y += deltaX * 0.01; 
            }
            previousMouseX = event.clientX;
        });

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
